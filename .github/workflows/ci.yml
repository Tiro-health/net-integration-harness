name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # Samples are consumer-facing examples and must consume the published
  # NuGet packages via PackageReference. ProjectReference into src/ is
  # fine for local dev iteration but must never be checked in.
  lint-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid ProjectReference to src/ in samples
        run: |
          if grep -rEn 'ProjectReference[^>]*Include="[^"]*src[\\/]' samples/; then
            echo "::error::Samples must consume libraries via PackageReference, not ProjectReference into src/."
            exit 1
          fi

  build-and-test:
    runs-on: windows-latest
    env:
      # Unique per-run version so samples (which use Version="*-*") restore
      # the freshly packed libraries from the local feed and never pick up
      # a stale 1.0.0 from nuget.org or the global packages cache.
      CI_PKG_VERSION: 0.0.0-ci.${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # nuget.config declares artifacts/packages as a local source; NuGet
      # errors out (NU1301) if the directory is missing on a fresh checkout.
      - name: Ensure local NuGet source exists
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts/packages | Out-Null

      # Pack covers build verification and produces nupkgs that the sample
      # build step below will consume from the local feed.
      - name: Pack src libraries
        shell: pwsh
        run: |
          Get-ChildItem -Path src -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "::group::Pack $($_.Name) @ $env:CI_PKG_VERSION"
            dotnet pack $_.FullName --configuration Release -p:Version=$env:CI_PKG_VERSION --output artifacts/packages
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }

      - name: Run unit tests
        shell: pwsh
        run: |
          Get-ChildItem -Path tests -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "::group::Test $($_.Name)"
            dotnet test $_.FullName --configuration Release --logger "trx;LogFileName=$($_.BaseName).trx"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      # Build samples against the just-packed nupkgs. This is the package
      # smoke test: catches missing content files, broken targets, dropped
      # TargetFrameworks, transitive PackageReference leaks, etc.
      - name: Build samples (package smoke test)
        shell: pwsh
        run: |
          Get-ChildItem -Path samples -Filter "*.vbproj" -Recurse | ForEach-Object {
            Write-Host "::group::Build $($_.Name)"
            dotnet build $_.FullName --configuration Release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }
