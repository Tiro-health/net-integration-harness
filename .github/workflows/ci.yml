name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # Samples are consumer-facing examples and must consume the published
  # NuGet packages via PackageReference. ProjectReference into src/ is
  # fine for local dev iteration but must never be checked in.
  lint-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid ProjectReference to src/ in samples
        run: |
          if grep -rEn 'ProjectReference[^>]*Include="[^"]*src[\\/]' samples/; then
            echo "::error::Samples must consume libraries via PackageReference, not ProjectReference into src/. See lines above."
            exit 1
          fi

  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The full solution can't be built on a fresh checkout because the VB
      # sample projects PackageReference the libraries by version. We build
      # the src libraries (which transitively cover all packable projects)
      # and the test project explicitly.
      - name: Build src libraries
        shell: pwsh
        run: |
          Get-ChildItem -Path src -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "::group::Build $($_.Name)"
            dotnet build $_.FullName --configuration Release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }

      - name: Run unit tests
        shell: pwsh
        run: |
          Get-ChildItem -Path tests -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "::group::Test $($_.Name)"
            dotnet test $_.FullName --configuration Release --logger "trx;LogFileName=$($_.BaseName).trx"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
