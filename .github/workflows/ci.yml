name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The samples are old-style (non-SDK) VB projects. Mixed sln files
      # (SDK-style src/, tests/ + non-SDK samples/) restore and build
      # cleanly under MSBuild but not under `dotnet build` alone — old-style
      # PackageReference restore there only partially populates references.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild net-integration-harness.sln -t:Restore -p:Configuration=Release

      - name: Build
        run: msbuild net-integration-harness.sln -p:Configuration=Release

      - name: Test
        run: dotnet test net-integration-harness.sln --configuration Release --no-build --logger "trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
