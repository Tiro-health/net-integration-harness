name: Build and Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # net48 + WinForms src projects don't reliably build under `dotnet pack`
      # (NU5026: net48 DLL not produced). MSBuild handles them correctly.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Strip the leading 'v' from the tag (e.g., v1.0.37 -> 1.0.37)
      - name: Parse version
        id: version
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version $VERSION"

      - name: Restore
        run: msbuild net-integration-harness.sln -t:Restore -p:Configuration=Release

      # Build the full sln first so every src/*.dll exists on disk. msbuild
      # -t:Pack on its own skips the Build target dependency for reasons
      # specific to the dotnet 10 SDK Pack targets and trips NU5026.
      - name: Build
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: msbuild net-integration-harness.sln -p:Configuration=Release -p:Version=$env:VERSION

      # Pack each src/*.csproj with the parsed version. SDK-style projects
      # propagate -p:Version into PackageVersion / AssemblyVersion /
      # FileVersion / InformationalVersion automatically. NoBuild=true
      # tells Pack to reuse the artifacts produced by the Build step.
      - name: Pack src libraries
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $output = Join-Path $PWD "artifacts/packages"
          Get-ChildItem -Path src -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "::group::Pack $($_.Name) @ $env:VERSION"
            msbuild $_.FullName -t:Pack -p:Configuration=Release -p:Version=$env:VERSION -p:PackageOutputPath=$output -p:NoBuild=true
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/packages/*.nupkg

      # dotnet nuget push doesn't reliably glob on Windows pwsh; enumerate
      # the nupkgs explicitly and push each.
      - name: Push to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Get-ChildItem -Path artifacts/packages -Filter "*.nupkg" | ForEach-Object {
            Write-Host "::group::Push $($_.Name)"
            dotnet nuget push $_.FullName `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Write-Host "::endgroup::"
          }
